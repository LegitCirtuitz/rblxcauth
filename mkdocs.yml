site_name: Roblox CAuth
site_url: https://LegitCirtuitz.github.io/rblxcauth/
repo_name: Roblox CAuth Project
repo_url: https://github.com/LegitCirtuitz/rblxcauth
theme:
  name: material
  custom_dir: overrides
  features:                       
    - content.code.copy
    - navigation.footer
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
nav:
  - Introduction: index.md
  - Fonts: fonts.md
  - Custom Code: customcode.md
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LegitCirtuitz
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@ItsCirtuitz
